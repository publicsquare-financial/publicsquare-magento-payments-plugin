name: Test
on: push

env:
  GCP_PROJECT_ID: psqpayments-stg-plugins

jobs:
  unit-tests:
    runs-on: ubuntu-22.04
    name: Run phpunit tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: php-actions/composer@v6
        name: Install composer dependencies
        with:
          args: '--ignore-platform-req=ext-zip'
      - name: Unit Test
        run: make unit-test-verbose

  acceptance-tests:
    runs-on: selenium
    name: Build and test codeception tests
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Create hosts entry for magento.test
        run: sudo echo "127.0.0.1 magento.test" | sudo tee -a /etc/hosts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache docker data
        uses: actions/cache@v4
        with:
          path: |
            docker-volumes
            # src/magento-site/vendor
            # vendor
          key: ${{ runner.os }}-composer-${{ github.repository }}-${{ hashFiles('compose.yaml') }}

      - name: Build Docker image
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, mbstring, openssl, pdo, pdo_sqlite
          ini-values: memory_limit=-1, date.timezone='UTC'
          coverage: xdebug
          tools: 'composer:v2'
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: psqpayments-shd-operations
          workload_identity_provider: projects/50446899764/locations/global/workloadIdentityPools/psq-github/providers/psq-github
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Load PublicSquare API keys from Secret Manager
        shell: bash
        run: |
          PUBLICSQUARE_PUBLIC_KEY="$(gcloud secrets versions access latest --secret=psq-payments-publicsquare-api-key --project="$GCP_PROJECT_ID")"
          PUBLICSQUARE_SECRET_KEY="$(gcloud secrets versions access latest --secret=psq-payments-publicsquare-api-secret --project="$GCP_PROJECT_ID")"

          echo "::add-mask::$PUBLICSQUARE_PUBLIC_KEY"
          echo "::add-mask::$PUBLICSQUARE_SECRET_KEY"

          {
            echo "PUBLICSQUARE_PUBLIC_KEY<<EOF"
            echo "$PUBLICSQUARE_PUBLIC_KEY"
            echo "EOF"
            echo "PUBLICSQUARE_SECRET_KEY<<EOF"
            echo "$PUBLICSQUARE_SECRET_KEY"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Docker compose
        run: make setup "$PUBLICSQUARE_PUBLIC_KEY" "$PUBLICSQUARE_SECRET_KEY"
          
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-suggest

      - name: Start selenium
        run: |
          sudo apt-get update && sudo apt-get install -y net-tools
          HOST_IP=$(ifconfig docker0 | grep 'inet ' | awk '{print $2}')
          echo "Host IP: $HOST_IP"
          docker run -d -p 4444:4444 -p 7900:7900 --add-host "magento.test:$HOST_IP" --shm-size="2g" --memory="4g" --cpus="2" selenium/standalone-chrome:latest

      - name: Netstat to see services listening on ports
        run : sudo apt install net-tools && sudo netstat -lp
        
      - name: Wait for Selenium 127.0.0.1:4444
        run: |
          for i in {1..10}; do
            if curl -s "http://127.0.0.1:4444/wd/hub/status" | jq ".value.ready" | grep 'true'; then
              echo "Selenium is ready!"
              break
            fi
            echo $(curl -s "http://localhost:4444/wd/hub/status")
            echo "Waiting for Selenium to be ready..."
            sleep 3
          done

      - name: Curl headers of http://magento.test
        run: curl -k -I http://magento.test

      - name: Run Integration Tests
        run: php vendor/bin/codecept run -f
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output
          path: /home/runner/work/publicsquare-magento-payments-plugin/publicsquare-magento-payments-plugin/tests/_output/
